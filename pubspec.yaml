name: steak_asri_pos
description: "Point of Sale system for Steak Asri restaurant"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.1.0
  pdf: ^3.11.3
  printing: ^5.11.0
  path_provider: ^2.1.5
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
